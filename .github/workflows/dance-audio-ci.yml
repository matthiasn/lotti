name: Dance Audio Tool CI

permissions:
  contents: read

on:
  push:
    branches: ["**"]
    paths:
      - "tools/dance_audio/**"
  pull_request:
    branches: [main]
    paths:
      - "tools/dance_audio/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dance-audio:
    name: Dance Audio (lint + test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tools/dance_audio

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            tools/dance_audio/requirements-dev.txt

      # Light install only: the unit tests monkeypatch the Beat This! call, so CI
      # never needs torch / beat-this (~1.3 GB). requirements-dev.txt pulls just
      # numpy + librosa + the lint/test tools.
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (flake8 + isort + black)
        run: make lint

      - name: Test
        run: make test

      - name: Test with coverage
        run: make test-cov
