name: Flathub Release PR

# Generates a Flathub submission from the current Lotti commit, pushes a
# version branch to flathub/com.matthiasn.lotti, and opens a PR against master.
#
# Trigger manually from the Actions tab. Optionally override the commit and
# version inputs; otherwise we use the workflow ref's commit and the version
# from pubspec.yaml.
on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Lotti commit SHA to release (defaults to the workflow ref)'
        required: false
        type: string
      version_override:
        description: 'Override version+build (e.g. 0.9.980+4003). Defaults to pubspec.yaml.'
        required: false
        type: string
      dry_run:
        description: 'Skip push and PR creation (for testing the workflow)'
        required: false
        type: boolean
        default: false

concurrency:
  # One Flathub PR at a time — avoid racing on the same branch name.
  group: flathub-release-pr
  cancel-in-progress: false

jobs:
  open-flathub-pr:
    name: Generate manifest and open Flathub PR
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      # 1. Check out Lotti into ./lotti and the Flathub repo into
      #    ./com.matthiasn.lotti so they sit as siblings, matching the
      #    layout that prepare_flathub_build.sh expects.
      - name: Checkout Lotti (main app)
        uses: actions/checkout@v5
        with:
          path: lotti
          ref: ${{ inputs.commit_sha || github.sha }}
          fetch-depth: 0

      - name: Checkout Flathub repo (com.matthiasn.lotti)
        uses: actions/checkout@v5
        with:
          repository: flathub/com.matthiasn.lotti
          ref: master
          path: com.matthiasn.lotti
          token: ${{ secrets.FLATHUB_PAT }}
          fetch-depth: 0
          # Persist the PAT in the local git config so subsequent push uses it.
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 2. Resolve version and the commit we're submitting. We expose them
      #    as outputs so later steps don't need to re-parse pubspec.yaml.
      - name: Resolve version and commit
        id: meta
        working-directory: lotti
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version_override }}" ]; then
            VERSION="${{ inputs.version_override }}"
          else
            VERSION=$(awk '/^version:[[:space:]]*/ {print $2; exit}' pubspec.yaml)
          fi
          if [ -z "$VERSION" ]; then
            echo "Could not determine version from pubspec.yaml" >&2
            exit 1
          fi
          COMMIT=$(git rev-parse HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "short_commit=${COMMIT:0:12}" >> "$GITHUB_OUTPUT"
          echo "Releasing version=$VERSION at commit=$COMMIT"

      # 3. Configure git identity on the Flathub clone so the commit we make
      #    is attributable.
      - name: Configure git identity in Flathub repo
        working-directory: com.matthiasn.lotti
        run: |
          git config user.name  "Lotti Release Bot"
          git config user.email "release-bot@lotti.local"

      # 4. Create (or reset) the release branch from master before generating
      #    files, so the generated artifacts land on the correct branch.
      #    Reset from origin/master so a previous run's local or remote state
      #    on this branch is discarded — the remote branch is force-pushed in
      #    step 6.
      - name: Create release branch in Flathub repo
        working-directory: com.matthiasn.lotti
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          git fetch origin master
          git checkout -B "$VERSION" origin/master

      # 5. Run the existing prepare script. It clones flatpak-flutter, runs
      #    it, and copies the generated manifest + sources into the sibling
      #    com.matthiasn.lotti checkout (which is now on the release branch).
      - name: Generate Flathub manifest
        working-directory: lotti
        env:
          COMMIT: ${{ steps.meta.outputs.commit }}
        run: |
          set -euo pipefail
          ./flatpak/prepare_flathub_build.sh "$COMMIT"

      # 6. Stage, commit, and push. If there's nothing to commit (e.g. the
      #    same commit was already published), fail loudly rather than open
      #    an empty PR.
      - name: Commit and push release branch
        if: ${{ !inputs.dry_run }}
        id: push
        working-directory: com.matthiasn.lotti
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit for version $VERSION" >&2
            exit 1
          fi
          git commit -m "chore: $VERSION"
          # Force-push so reruns over an existing remote branch succeed; the
          # branch is dedicated to this release and was just reset from
          # origin/master above.
          git push --force-with-lease --set-upstream origin "$VERSION"

      # 7. Open the PR using gh, or reuse an existing open PR for this branch
      #    so reruns of this workflow don't fail on `gh pr create`. We rely on
      #    FLATHUB_PAT (a PAT with `repo` scope) — GITHUB_TOKEN cannot create
      #    PRs in the flathub org.
      - name: Create or reuse pull request
        if: ${{ !inputs.dry_run }}
        id: pr
        working-directory: com.matthiasn.lotti
        env:
          GH_TOKEN: ${{ secrets.FLATHUB_PAT }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHORT_COMMIT: ${{ steps.meta.outputs.short_commit }}
        run: |
          set -euo pipefail
          EXISTING_PR=$(gh pr list \
            --repo flathub/com.matthiasn.lotti \
            --head "$VERSION" \
            --base master \
            --state open \
            --json url \
            --jq '.[0].url // empty')
          if [ -n "$EXISTING_PR" ]; then
            PR_URL="$EXISTING_PR"
            echo "Reusing existing PR: $PR_URL"
            HEADING="### Flathub PR updated"
          else
            PR_URL=$(gh pr create \
              --repo flathub/com.matthiasn.lotti \
              --base master \
              --head "$VERSION" \
              --title "chore: $VERSION" \
              --body "Automated release submission for Lotti \`$VERSION\` (upstream commit \`$SHORT_COMMIT\`).

          Generated by .github/workflows/flathub-release-pr.yml from upstream run \
          [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          ")
            echo "Opened PR: $PR_URL"
            HEADING="### Flathub PR opened"
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "$HEADING" >> "$GITHUB_STEP_SUMMARY"
          echo "$PR_URL" >> "$GITHUB_STEP_SUMMARY"
