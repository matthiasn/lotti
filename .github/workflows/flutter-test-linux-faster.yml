name: Flutter Tests (Unit + Glados Property)

on:
  push:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit & Widget Tests (Linux, shard ${{ matrix.shard_label }}/5)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 0
            shard_label: 1
          - shard_index: 1
            shard_label: 2
          - shard_index: 2
            shard_label: 3
          - shard_index: 3
            shard_label: 4
          - shard_index: 4
            shard_label: 5
    steps:
      - uses: actions/checkout@v5
      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
      - uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config-action
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Activate very_good_cli
        run: dart pub global activate very_good_cli
      - name: Run Flutter tests (standard)
        run: |
          very_good test --coverage --exclude-tags glados -- \
            --total-shards=5 \
            --shard-index=${{ matrix.shard_index }}
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: matthiasn/lotti
          fail_ci_if_error: true
          flags: standard
          name: standard-shard-${{ matrix.shard_label }}
          files: coverage/lcov.info

  glados:
    name: Glados Property Tests (Linux)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
      - uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config-action
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Activate very_good_cli
        run: dart pub global activate very_good_cli
      - name: Run Flutter tests (glados)
        run: very_good test --coverage --tags glados
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: matthiasn/lotti
          fail_ci_if_error: true
          flags: glados
          files: coverage/lcov.info

  codecov:
    name: Publish Codecov Status
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs:
      - test
      - glados
    steps:
      - uses: actions/checkout@v5
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: matthiasn/lotti
          fail_ci_if_error: true
          run_command: send-notifications
