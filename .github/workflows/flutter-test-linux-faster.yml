name: Flutter Tests (Unit + Glados Property)

on:
  push:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit & Widget Tests (Linux, shard ${{ matrix.shard_label }}/10)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 0
            shard_label: 1
          - shard_index: 1
            shard_label: 2
          - shard_index: 2
            shard_label: 3
          - shard_index: 3
            shard_label: 4
          - shard_index: 4
            shard_label: 5
          - shard_index: 5
            shard_label: 6
          - shard_index: 6
            shard_label: 7
          - shard_index: 7
            shard_label: 8
          - shard_index: 8
            shard_label: 9
          - shard_index: 9
            shard_label: 10
    steps:
      - uses: actions/checkout@v5
      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
      - uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config-action
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Activate very_good_cli
        run: dart pub global activate very_good_cli
      - name: Run Flutter tests (standard)
        run: |
          # Shards gate test PASSING only. Coverage moved to the dedicated
          # `coverage` job below: coverage recording under the sharded
          # very_good runner proved unreliable (whole suites' hits vanished
          # from every shard's lcov nondeterministically between runs while
          # their tests passed), so the fast lane no longer records it.
          very_good test --exclude-tags glados -- \
            --total-shards=10 \
            --shard-index=${{ matrix.shard_index }}

  glados:
    name: Glados Property Tests (Linux)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
      - uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config-action
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Activate very_good_cli
        run: dart pub global activate very_good_cli
      - name: Run Flutter tests (glados)
        run: very_good test --coverage --tags glados
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: matthiasn/lotti
          version: v11.2.8
          fail_ci_if_error: true
          flags: glados
          files: coverage/lcov.info

  coverage:
    name: Coverage (full suite)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - name: Cache Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
      - uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config-action
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true
      - name: Get dependencies
        run: flutter pub get
      # Plain `flutter test --coverage` over the whole suite in one run:
      # the sharded very_good lane dropped whole suites' hits from its lcov
      # nondeterministically (tests passing, coverage silently absent), so
      # the Codecov report comes from the one collection mode that matches
      # local verification. Glados property tests keep their own flag/job.
      - name: Run Flutter tests with coverage
        # --concurrency=1 mirrors the same-thread execution the suite is
        # hardened for under very_good test (see test/README.md).
        run: flutter test --coverage --concurrency=1 --exclude-tags glados
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: matthiasn/lotti
          version: v11.2.8
          fail_ci_if_error: true
          flags: standard
          name: standard-full
          files: coverage/lcov.info

  codecov:
    name: Publish Codecov Status
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs:
      - coverage
      - glados
    steps:
      - uses: actions/checkout@v5
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: matthiasn/lotti
          version: v11.2.8
          fail_ci_if_error: true
          run_command: send-notifications
