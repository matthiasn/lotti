name: Manual

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/manual.yml'
      - 'docs-site/**'
      - 'docs/MANUAL.md'
      - 'docs/implementation_plans/2026-07-17_automated_manual_system.md'
      - 'Makefile'
      - 'pubspec.yaml'
      - 'test/features/settings/ui/settings_home_screenshots_test.dart'
      - 'test/features/daily_os_next/screenshot_harness.dart'
      - 'test/features/**/*_screenshots_test.dart'
  push:
    branches: [main]
    paths:
      - '.github/workflows/manual.yml'
      - 'docs-site/**'
      - 'docs/MANUAL.md'
      - 'docs/implementation_plans/2026-07-17_automated_manual_system.md'
      - 'Makefile'
      - 'pubspec.yaml'
      - 'test/features/settings/ui/settings_home_screenshots_test.dart'
      - 'test/features/daily_os_next/screenshot_harness.dart'
      - 'test/features/**/*_screenshots_test.dart'
  schedule:
    - cron: '23 2 * * *'
  workflow_dispatch:
    inputs:
      manual_version:
        description: 'development or an app marketing version such as 1.0.0'
        required: true
        default: 'development'
        type: string
      capture_screenshots:
        description: 'Regenerate the registered screenshot catalog'
        required: true
        default: true
        type: boolean
      publish_media:
        description: 'Commit generated media to lotti-docs/main'
        required: true
        default: false
        type: boolean
      deploy:
        description: 'Publish the static build to GitHub Pages'
        required: true
        default: true
        type: boolean

concurrency:
  group: manual-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  metadata:
    name: Resolve manual version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Validate requested version
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.manual_version }}
        run: |
          set -euo pipefail
          VERSION="${REQUESTED_VERSION:-development}"
          if [[ "$VERSION" != "development" ]] && \
             ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid manual version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Validate and build
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout Lotti
        uses: actions/checkout@v5
        with:
          path: lotti
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: lotti/docs-site/package-lock.json

      - name: Install locked dependencies
        working-directory: lotti/docs-site
        run: npm ci

      - name: Reject high-severity production advisories
        working-directory: lotti/docs-site
        run: npm audit --omit=dev --audit-level=high

      - name: Validate, test, type-check, and build
        working-directory: lotti/docs-site
        env:
          MANUAL_VERSION: ${{ needs.metadata.outputs.version }}
          MANUAL_SITE_URL: https://${{ github.repository_owner }}.github.io
          MANUAL_ROOT_PATH: /${{ github.event.repository.name }}/manual
          MANUAL_BASE_URL: /${{ github.event.repository.name }}/manual/${{ needs.metadata.outputs.version }}/
        run: npm run check

      - name: Upload static manual
        uses: actions/upload-artifact@v4
        with:
          name: lotti-manual-${{ needs.metadata.outputs.version }}
          path: lotti/docs-site/build
          if-no-files-found: error
          retention-days: 14

      - name: Configure GitHub Pages
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy &&
           needs.metadata.outputs.version == 'development')
        uses: actions/configure-pages@v5

      - name: Assemble versioned GitHub Pages snapshot
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy &&
           needs.metadata.outputs.version == 'development')
        working-directory: lotti/docs-site
        run: >-
          npm run pages:assemble --
          --build-root build
          --output-root "${RUNNER_TEMP}/lotti-manual-pages"
          --pages-prefix "${{ github.event.repository.name }}"
          --version "${{ needs.metadata.outputs.version }}"

      - name: Upload GitHub Pages artifact
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy &&
           needs.metadata.outputs.version == 'development')
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/lotti-manual-pages

  screenshots:
    name: Capture screenshot catalog
    needs: metadata
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.capture_screenshots)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Lotti
        uses: actions/checkout@v5
        with:
          path: lotti
          fetch-depth: 0

      - name: Checkout media repository
        uses: actions/checkout@v5
        with:
          repository: matthiasn/lotti-docs
          ref: main
          path: lotti-docs
          token: ${{ secrets.LOTTI_DOCS_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: lotti/docs-site/package-lock.json

      - name: Read the pinned Flutter version
        uses: kuhnroyal/flutter-fvm-config-action@v2
        id: flutter-version
        with:
          path: lotti/.fvmrc

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.flutter-version.outputs.FLUTTER_CHANNEL }}
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Install Flutter dependencies
        working-directory: lotti
        run: fvm flutter pub get --enforce-lockfile

      - name: Capture and materialize registered screenshots
        working-directory: lotti
        run: >-
          make manual_screenshots
          MANUAL_VERSION="${{ needs.metadata.outputs.version }}"
          LOTTI_DOCS_DIR="${{ github.workspace }}/lotti-docs"
          MANUAL_CAPTURE_DIR="${{ runner.temp }}/lotti-manual-capture/${{ needs.metadata.outputs.version }}"

      - name: Upload generated media for review
        uses: actions/upload-artifact@v4
        with:
          name: lotti-manual-media-${{ needs.metadata.outputs.version }}
          path: lotti-docs/manual/screenshots/${{ needs.metadata.outputs.version }}
          if-no-files-found: error
          retention-days: 14

      - name: Commit media to lotti-docs/main
        if: >-
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_media)
        working-directory: lotti-docs
        env:
          MANUAL_VERSION: ${{ needs.metadata.outputs.version }}
          LOTTI_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name 'Lotti Manual Bot'
          git config user.email 'manual-bot@lotti.local'
          git add "manual/screenshots/$MANUAL_VERSION"
          if git diff --cached --quiet; then
            echo "Screenshot catalog is already current."
            exit 0
          fi
          git commit -m "docs: refresh $MANUAL_VERSION manual screenshots for ${LOTTI_COMMIT:0:12}"
          git push origin HEAD:main

  deploy:
    name: Publish GitHub Pages
    needs: [metadata, build]
    if: >-
      needs.build.result == 'success' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.deploy &&
        needs.metadata.outputs.version == 'development'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
