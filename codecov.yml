codecov:
  notify:
    # Sharded coverage uploads arrive independently, so do not let Codecov
    # publish transient project statuses from a partial report set.
    # The GitHub workflow sends a single notification once all coverage
    # upload jobs have completed successfully.
    manual_trigger: true
    wait_for_ci: true

flag_management:
  default_rules:
    # Keep branch/project coverage stable while one of the split reports is
    # still running. The current commit replaces the carried-forward flag as
    # soon as that flag's real upload arrives.
    carryforward: true

coverage:
  status:
    project:
      default:
        threshold: 0.1%
    patch:
      default:
        target: 93%
ignore:
  - "**/*.g.dart"
  - "**/*.freezed.dart"
  - "**/l10n/*.dart"
  - "**/widgetbook/**"
  # Composition root: pure service wiring exercised end-to-end by
  # integration tests rather than unit-mocked. Line coverage here is
  # misleading and churns on every wiring change.
  - "lib/get_it.dart"
  # Platform/native-gated code: macOS/iOS notification delivery, desktop
  # window + menu integration, XDG desktop portals (screenshots, location),
  # and the native image picker. These paths require a real desktop session
  # / OS services and cannot be exercised by the headless Linux CI test
  # runner, so their line coverage is structurally misleading.
  - "lib/services/notification_service.dart"
  - "lib/services/window_service.dart"
  - "lib/widgets/misc/desktop_menu.dart"
  - "lib/utils/screenshots.dart"
  - "lib/utils/location.dart"
  - "lib/services/portals/portal_service.dart"
  - "lib/services/portals/screenshot_portal_service.dart"
  - "lib/services/linux_location_portal.dart"
  - "lib/logic/image_import.dart"
