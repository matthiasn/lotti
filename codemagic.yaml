workflows:
  windows-release:
    name: Windows Release
    instance_type: windows_x2
    max_build_duration: 90
    environment:
      flutter: 3.41.4
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - name: Show toolchain versions
        script: |
          flutter --version
          dart --version

      - name: Install Rust toolchain (required by flutter_vodozemac/cargokit)
        script: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable --profile minimal
          $cargoBin = "$env:USERPROFILE\.cargo\bin"
          "PATH=$cargoBin;$env:PATH" | Out-File -FilePath $env:CM_ENV -Append -Encoding utf8
          & "$cargoBin\rustc.exe" --version
          & "$cargoBin\cargo.exe" --version

      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter analyze
        script: flutter analyze
        ignore_failure: true

      - name: Build Windows release
        script: flutter build windows --release

      - name: Package MSIX
        script: dart run msix:create --release
        ignore_failure: true

      - name: Zip release artifacts
        script: |
          $src = "$env:CM_BUILD_DIR\build\windows\x64\runner\Release"
          $dst = "$env:CM_BUILD_DIR\lotti-windows-x64.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dst -Force
    artifacts:
      - build/windows/x64/runner/Release/**/*
      - lotti-windows-x64.zip
      - build/windows/**/*.msix
    publishing:
      email:
        recipients:
          - matthias.nehlsen@gmail.com
        notify:
          success: true
          failure: true
