tags:
  glados:
    description: Property-based tests powered by the `glados` package.
  performance:
    description: >-
      Slow performance/benchmark tests (e.g. large-dataset inserts under a long
      @Timeout). Can be kept out of the fast default lane via
      `--exclude-tags performance` and run on a dedicated CI step.
  eval-live:
    description: >-
      Manual local-inference evals that call a local model server and write
      report artifacts. They are skipped unless explicitly enabled.
  tutorial-video:
    description: >-
      Tutorial-video drivers under integration_test/tutorial/ — paced at human
      speed for screen recording via `fvm flutter drive` (see
      tools/tutorial_videos/README.md). Not runnable under plain `flutter
      test` (no window, requires LOTTI_TUTORIAL_MANIFEST/TIMELINE env vars),
      so excluded from `make integration_test` via `--exclude-tags`.
