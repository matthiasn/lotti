<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Make Noto Color Emoji the preferred fallback for any text family Flutter
  asks fontconfig to resolve. Without this, Skia on Linux returns tofu for
  every emoji that the primary family (Inter, Inconsolata, sans-serif, etc.)
  cannot render.

  Install via `linux/install_emoji_fonts.sh`. Requires the
  `fonts-noto-color-emoji` package (or distro equivalent).
-->
<fontconfig>
  <alias>
    <family>sans-serif</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>
  <alias>
    <family>Inter</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>
  <alias>
    <family>Inconsolata</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>
</fontconfig>
