# Combined Docker Compose for local dashboard development
# Usage: docker compose -f docker-compose.dashboard.yml up
#
# Starts: TigerBeetle, Credits Service, AI Proxy Service, Dashboard
# Dashboard available at: http://localhost:5173

services:
  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.16
    container_name: dashboard-tigerbeetle
    ports:
      - "3000:3000"
    volumes:
      - tigerbeetle-data:/data
      - ./credits-service/init-tigerbeetle.sh:/init-tigerbeetle.sh:ro
    entrypoint: ["/bin/sh", "/init-tigerbeetle.sh"]
    healthcheck:
      test: ["CMD", "/tigerbeetle", "version"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - dashboard-network

  credits-service:
    build: ./credits-service
    container_name: dashboard-credits-service
    ports:
      - "8001:8001"
    environment:
      - TIGERBEETLE_HOST=tigerbeetle
      - TIGERBEETLE_PORT=3000
      - LOG_LEVEL=INFO
      - PORT=8001
      - API_KEYS=${API_KEY:-dev-key}
      - ADMIN_API_KEYS=${ADMIN_API_KEY:-dev-admin-key}
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      - credits-data:/app/data
    depends_on:
      tigerbeetle:
        condition: service_healthy
    networks:
      - dashboard-network
    restart: unless-stopped

  ai-proxy-service:
    build: ./ai-proxy-service
    container_name: dashboard-ai-proxy
    ports:
      - "8002:8002"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CREDITS_SERVICE_URL=http://credits-service:8001
      - CREDITS_SERVICE_API_KEY=${API_KEY:-dev-key}
      - API_KEYS=${API_KEY:-dev-key}
      - ADMIN_API_KEYS=${ADMIN_API_KEY:-dev-admin-key}
      - LOG_LEVEL=INFO
      - PORT=8002
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:8080
    volumes:
      - proxy-data:/app/data
    depends_on:
      - credits-service
    networks:
      - dashboard-network
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: dashboard-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_KEY=${ADMIN_API_KEY:-dev-admin-key}
    depends_on:
      - credits-service
      - ai-proxy-service
    networks:
      - dashboard-network

volumes:
  tigerbeetle-data:
    driver: local
  credits-data:
    driver: local
  proxy-data:
    driver: local

networks:
  dashboard-network:
    driver: bridge
