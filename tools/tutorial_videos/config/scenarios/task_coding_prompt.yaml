# Tutorial scenario: a complex coding task becomes a ready-to-paste coding
# prompt — the "Generate Coding Prompt" skill assembles task, description,
# and checklist into a structured prompt for AI coding assistants; the video
# scrolls through the generated prompt unhurriedly.

scenario: task_coding_prompt

title:
  en: Turn a coding task into an AI-ready prompt
  de: Aus einer Coding-Aufgabe ein KI-Prompt machen
  fr: Transformer une tâche de code en prompt prêt pour l'IA
  it: Trasforma un'attività di coding in un prompt pronto per l'IA
  es: Convierte una tarea de programación en un prompt listo para la IA
  cs: Z programátorského úkolu hotový prompt pro AI
  nl: Van een codeertaak naar een kant-en-klare AI-prompt
  ro: Transformați o sarcină de codare într-un prompt gata pentru AI
  pt: Transforme uma tarefa de código em um prompt pronto para IA
  da: Gør en kodeopgave til en AI-klar prompt
  sv: Gör en kodningsuppgift till en AI-klar prompt

dictionary:
  en:
