# Tutorial scenario: let the AI create cover art for a simple task — run
# "Generate Cover Art" on the task's note and watch the generated image
# become the task's cover in the header and the list.
# The image generation itself is mocked deterministically (same penguin
# artwork every run) so the video is reproducible; the entire UI flow —
# menu, progress, import, cover assignment — is the real product code.

scenario: task_cover_art

title:
  en: Let AI create your task's cover art
  de: Lass die KI dein Aufgaben-Titelbild gestalten
  fr: Laisse l'IA créer la couverture de ta tâche
  it: Lascia che l'IA crei la copertina della tua attività
  es: Deja que la IA cree la portada de tu tarea
  cs: Nech AI vytvořit titulní obrázek tvého úkolu
  nl: Laat AI de cover van je taak maken
  ro: Lăsați AI să creeze coperta sarcinii dvs.
  pt: Deixe a IA criar a capa da sua tarefa
  da: Lad AI skabe coverbilledet til din opgave
  sv: Låt AI skapa omslagsbilden till din uppgift

dictionary:
  en:
    - Project Waddle
  de:
    - Projekt Waddle
  fr:
